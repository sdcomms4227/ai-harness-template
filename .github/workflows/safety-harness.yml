name: Safety Harness

on:
  pull_request:
    branches: [main, develop]
    types: [opened, synchronize, reopened]

jobs:
  # ── 1. 보안 파일 변경 감지 ──────────────────────────────────────────────
  scope-guard:
    name: Scope Guard (Blocked Files)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect blocked file changes
        id: scope
        run: |
          BASE=${{ github.event.pull_request.base.sha }}
          HEAD=${{ github.event.pull_request.head.sha }}
          CHANGED=$(git diff --name-only "$BASE" "$HEAD")

          BLOCKED_PATTERNS=(
            "SecurityConfig"
            "WebMvcConfig"
            "application.*\.yml"
            "application.*\.properties"
            "db/migration/"
            "migration/.*\.sql"
          )

          VIOLATIONS=""
          while IFS= read -r file; do
            for pattern in "${BLOCKED_PATTERNS[@]}"; do
              if echo "$file" | grep -qE "$pattern"; then
                VIOLATIONS="$VIOLATIONS\n- \`$file\` (matched: $pattern)"
              fi
            done
          done <<< "$CHANGED"

          if [ -n "$VIOLATIONS" ]; then
            echo "violations=true" >> "$GITHUB_OUTPUT"
            echo "details<<EOF" >> "$GITHUB_OUTPUT"
            echo -e "$VIOLATIONS" >> "$GITHUB_OUTPUT"
            echo "EOF" >> "$GITHUB_OUTPUT"
          else
            echo "violations=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Comment – scope violation
        if: steps.scope.outputs.violations == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `## ❌ Safety Harness: Scope Violation\n\nAI가 수정 금지 파일을 변경했습니다. 머지가 차단됩니다.\n\n**차단된 파일:**\n${{ steps.scope.outputs.details }}\n\n> 사람이 직접 검토 후 처리하세요.`
            })

      - name: Fail on scope violation
        if: steps.scope.outputs.violations == 'true'
        run: |
          echo "::error::보안/설정 파일 변경이 감지되었습니다. 상세 내용은 PR 코멘트를 확인하세요."
          exit 1

  # ── 2. 정적 분석 (Checkstyle + SpotBugs) ──────────────────────────────
  static-analysis:
    name: Static Analysis
    runs-on: ubuntu-latest
    needs: scope-guard
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      - name: Grant execute permission
        run: chmod +x gradlew

      - name: Run Checkstyle
        run: ./gradlew checkstyleMain checkstyleTest --no-daemon

      - name: Run SpotBugs
        run: ./gradlew spotbugsMain --no-daemon

      - name: Upload Checkstyle report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: checkstyle-report
          path: build/reports/checkstyle/

      - name: Upload SpotBugs report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: spotbugs-report
          path: build/reports/spotbugs/

  # ── 3. 테스트 게이트 ───────────────────────────────────────────────────
  test-gate:
    name: Test Gate (JUnit)
    runs-on: ubuntu-latest
    needs: scope-guard
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      - name: Grant execute permission
        run: chmod +x gradlew

      - name: Run tests
        run: ./gradlew test --no-daemon

      - name: Upload test report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-report
          path: build/reports/tests/

  # ── 4. 감사 추적 검증 ─────────────────────────────────────────────────
  audit-check:
    name: Audit Trail Check
    runs-on: ubuntu-latest
    if: contains(github.event.pull_request.title, '[AI-GENERATED]')

    steps:
      - name: Verify required PR metadata
        uses: actions/github-script@v7
        with:
          script: |
            const body = context.payload.pull_request.body || '';
            const required = ['issue:', 'generated_by:', 'label:'];
            const missing = required.filter(field => !body.includes(field));

            if (missing.length > 0) {
              core.setFailed(
                `AI-GENERATED PR에 필수 메타데이터가 없습니다: ${missing.join(', ')}`
              );
            } else {
              console.log('감사 추적 메타데이터 확인 완료');
            }

  # ── 5. 최종 결과 집계 ─────────────────────────────────────────────────
  harness-result:
    name: Harness Result
    runs-on: ubuntu-latest
    needs: [scope-guard, static-analysis, test-gate]
    if: always()
    permissions:
      pull-requests: write

    steps:
      - name: Evaluate harness result
        uses: actions/github-script@v7
        with:
          script: |
            const jobs = {
              'Scope Guard':       '${{ needs.scope-guard.result }}',
              'Static Analysis':   '${{ needs.static-analysis.result }}',
              'Test Gate':         '${{ needs.test-gate.result }}',
            };

            const failed = Object.entries(jobs)
              .filter(([, r]) => r === 'failure')
              .map(([name]) => name);

            const passed = failed.length === 0;
            const icon   = passed ? '✅' : '❌';
            const status = passed ? '모든 게이트 통과 — 사람 승인 후 머지 가능합니다.' : `실패한 게이트: ${failed.join(', ')}`;

            github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `## ${icon} Safety Harness 결과\n\n${status}`
            });

            if (!passed) core.setFailed('Safety Harness 실패');
